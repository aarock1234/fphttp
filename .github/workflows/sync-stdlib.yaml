name: Sync net/http from Go stdlib

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Go version
        id: version
        run: |
          version=$(curl -sf 'https://go.dev/dl/?mode=json' | jq -r '.[0].version')
          base=$(cat .stdlib-version 2>/dev/null || echo "")

          if [ "$base" = "$version" ]; then
            echo "already at $version"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

          echo "tag=$version" >> "$GITHUB_OUTPUT"
          echo "base=$base" >> "$GITHUB_OUTPUT"

      - name: Sync upstream files
        if: steps.version.outputs.skip == 'false'
        run: |
          new="${{ steps.version.outputs.tag }}"
          base="${{ steps.version.outputs.base }}"

          # download new upstream
          curl -sfL "https://github.com/golang/go/archive/refs/tags/${new}.tar.gz" -o /tmp/new.tar.gz
          root=$(tar tf /tmp/new.tar.gz 2>/dev/null | head -1 | cut -d'/' -f1)
          mkdir -p /tmp/new
          tar xzf /tmp/new.tar.gz -C /tmp/new --strip-components=4 "${root}/src/net/http/"

          # download base upstream for three-way merge
          if [ -n "$base" ]; then
            curl -sfL "https://github.com/golang/go/archive/refs/tags/${base}.tar.gz" -o /tmp/base.tar.gz
            root=$(tar tf /tmp/base.tar.gz 2>/dev/null | head -1 | cut -d'/' -f1)
            mkdir -p /tmp/base
            tar xzf /tmp/base.tar.gz -C /tmp/base --strip-components=4 "${root}/src/net/http/"
          fi

          find /tmp/new -type f -print0 | while IFS= read -r -d '' file; do
            rel="${file#/tmp/new/}"
            case "$rel" in *_test.go) continue ;; esac
            [ -f "./$rel" ] || continue

            if [ -n "$base" ] && [ -f "/tmp/base/$rel" ]; then
              # three-way merge: preserves local modifications, applies upstream delta
              git merge-file -L ours -L base -L upstream "./$rel" "/tmp/base/$rel" "/tmp/new/$rel" || true
            else
              cp "$file" "./$rel"
            fi
          done

          echo "$new" > .stdlib-version

          # update go directive in go.mod
          go_version="${new#go}"
          sed -i "s/^go .*/go $go_version/" go.mod

      - name: Create PR
        if: steps.version.outputs.skip == 'false'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "sync: update net/http from Go ${{ steps.version.outputs.tag }}"
          branch: sync/stdlib-${{ steps.version.outputs.tag }}
          title: "sync: update net/http from Go ${{ steps.version.outputs.tag }}"
          body: "Synced from [src/net/http](https://github.com/golang/go/tree/${{ steps.version.outputs.tag }}/src/net/http) in Go ${{ steps.version.outputs.tag }}."
          delete-branch: true
