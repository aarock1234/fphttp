name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (use 'none' to release the current latest tag without bumping)"
        required: true
        type: choice
        options:
          - none
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # triggered by a tag push; release that tag as-is.
            version="${GITHUB_REF#refs/tags/}"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "needs_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest=$(git tag --list 'v*.*.*' --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi

          if [ "${{ inputs.bump }}" = "none" ]; then
            if [ "$latest" = "v0.0.0" ]; then
              echo "no existing tag to release; choose patch/minor/major" >&2
              exit 1
            fi
            echo "version=$latest" >> "$GITHUB_OUTPUT"
            echo "needs_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          major=$(echo "$latest" | cut -d. -f1 | tr -d v)
          minor=$(echo "$latest" | cut -d. -f2)
          patch=$(echo "$latest" | cut -d. -f3)

          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          echo "version=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"
          echo "needs_tag=true" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Tag and push
        if: steps.tag.outputs.needs_tag == 'true'
        run: |
          git tag "${{ steps.tag.outputs.version }}"
          git push origin "${{ steps.tag.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          generate_release_notes: true
